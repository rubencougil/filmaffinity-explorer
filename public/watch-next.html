<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FilmAffinity Explorer Qué ver</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="topbar-inner">
        <div class="brand-block">
          <a class="brand-mark" href="/">FilmAffinity Explorer</a>
        </div>

        <nav class="top-links" aria-label="Primary">
          <a data-nav-target="home" href="/">🎬 Biblioteca</a>
          <a class="is-active" data-nav-target="watchnext" href="/watch-next.html">🍿 Qué ver</a>
          <a data-nav-target="affinity" href="/affinity.html">🤝 Afinidad</a>
          <a data-nav-target="stats" href="/stats.html">📊 Estadísticas</a>
          <a data-nav-target="sync" href="/sync.html">⚡ Sync</a>
        </nav>

        <label class="field topbar-user-field">
          <select id="global-user-selector"></select>
        </label>
      </div>
    </header>

    <div class="page-shell">
      <main class="layout library-layout">
        <section class="panel">
          <div class="panel-header">
            <div>
              <p class="panel-kicker">Top sugerencias</p>
              <h2>Qué ver a continuación</h2>
            </div>
          </div>

          <p id="watch-next-status" class="status-text"></p>
          <div id="watch-next-meta" class="results-meta"></div>
          <div id="watch-next-results" class="watch-next-grid"></div>
          <div id="watch-next-pagination" class="pagination" hidden>
            <button id="watch-next-prev-page" class="ghost-button" type="button">Anterior</button>
            <span id="watch-next-page-info" class="page-info"></span>
            <button id="watch-next-next-page" class="ghost-button" type="button">Siguiente</button>
          </div>
        </section>

        <aside class="panel filter-sidebar" aria-label="Filtros recomendaciones">
          <div class="panel-header sidebar-header">
            <div>
              <p class="panel-kicker">Filtros</p>
              <h2>Buscar y filtrar</h2>
            </div>
          </div>

          <div class="search-controls sidebar-controls">
            <label class="field search-field">
              <span>🔎 Búsqueda rápida</span>
              <div class="search-pill">
                <input
                  id="watch-next-search-input"
                  type="search"
                  placeholder="Busca entre las recomendaciones"
                />
              </div>
            </label>

            <label class="field small-field">
              <span>⭐ Nota mínima</span>
              <div class="rating-filter">
                <select id="watch-next-min-rating">
                  <option value="0" selected>Todas</option>
                  <option value="1">1+</option>
                  <option value="2">2+</option>
                  <option value="3">3+</option>
                  <option value="4">4+</option>
                  <option value="5">5+</option>
                  <option value="6">6+</option>
                  <option value="7">7+</option>
                  <option value="8">8+</option>
                  <option value="9">9+</option>
                  <option value="10">10</option>
                </select>
              </div>
            </label>

            <label class="field small-field">
              <span>📅 Año</span>
              <div class="rating-filter">
                <select id="watch-next-year-filter">
                  <option value="all" selected>Todos los años</option>
                </select>
              </div>
            </label>

            <label class="field small-field">
              <span>🎭 Género</span>
              <div class="rating-filter">
                <select id="watch-next-genre-filter">
                  <option value="all" selected>Todos los géneros</option>
                  <option value="terror">Terror</option>
                  <option value="accion">Acción</option>
                  <option value="drama">Drama</option>
                  <option value="animacion">Animación</option>
                  <option value="aventuras">Aventuras</option>
                  <option value="belico">Bélico</option>
                  <option value="ciencia ficcion">Ciencia ficción</option>
                  <option value="cine negro">Cine negro</option>
                  <option value="comedia">Comedia</option>
                  <option value="desconocido">Desconocido</option>
                  <option value="documental">Documental</option>
                  <option value="fantastico">Fantástico</option>
                  <option value="infantil">Infantil</option>
                  <option value="intriga">Intriga</option>
                  <option value="musical">Musical</option>
                  <option value="romance">Romance</option>
                  <option value="serie de tv">Serie de TV</option>
                  <option value="thriller">Thriller</option>
                  <option value="western">Western</option>
                </select>
              </div>
              <small id="watch-next-genre-hint" class="hint genre-hint"></small>
            </label>

            <label class="field small-field">
              <span>👥 Votos comunes</span>
              <div class="toggle-field">
                <input id="watch-next-shared-only" type="checkbox" />
                <span>Solo apoyo múltiple</span>
              </div>
            </label>
          </div>
        </aside>
      </main>
    </div>

    <template id="watch-next-template">
      <article class="watch-next-card">
        <a class="watch-next-poster-link" href="" target="_blank" rel="noreferrer">
          <img class="watch-next-poster" src="" alt="" loading="lazy" />
        </a>
        <div class="watch-next-body">
          <div class="watch-next-topline">
            <span class="watch-next-score"></span>
            <span class="watch-next-year"></span>
          </div>
          <h3 class="watch-next-title"></h3>
          <p class="watch-next-rationale"></p>
          <div class="watch-next-chips"></div>
        </div>
      </article>
    </template>

    <div id="trailer-modal" class="trailer-modal" hidden>
      <div class="trailer-modal-dialog" role="dialog" aria-modal="true" aria-labelledby="trailer-title">
        <div class="trailer-modal-header">
          <h3 id="trailer-title">Trailer</h3>
          <button id="trailer-close" class="ghost-button trailer-close" type="button" aria-label="Cerrar trailer">
            ✕
          </button>
        </div>
        <div class="trailer-frame-wrap">
          <iframe
            id="trailer-frame"
            title="Trailer de YouTube"
            src=""
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
            referrerpolicy="strict-origin-when-cross-origin"
            allowfullscreen
          ></iframe>
        </div>
      </div>
    </div>

    <script src="/watch-next.js"></script>
  </body>
</html>
