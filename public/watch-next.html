<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow, noarchive, nosnippet, noimageindex" />
    <meta name="googlebot" content="noindex, nofollow, noarchive, nosnippet, noimageindex" />
    <meta name="bingbot" content="noindex, nofollow, noarchive, nosnippet, noimageindex" />
    <title>FilmAffinity Explorer Qué ver</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="topbar-inner">
        <div class="brand-block">
          <a class="brand-mark" href="index.html">FilmAffinity Explorer</a>
        </div>

        <nav class="top-links" aria-label="Primary">
          <a data-nav-target="home" href="index.html">🎬 Biblioteca</a>
          <a class="is-active" data-nav-target="watchnext" href="watch-next.html">🍿 Qué ver</a>
          <a data-nav-target="affinity" href="affinity.html">🤝 Afinidad</a>
          <a data-nav-target="stats" href="stats.html">📊 Estadísticas</a>
        </nav>

        <div class="topbar-controls">
          <button id="global-theme-toggle" class="theme-toggle" type="button" aria-label="Cambiar tema" aria-pressed="false">
            <span class="theme-toggle-track" aria-hidden="true"><span class="theme-toggle-thumb"></span></span>
            <span class="theme-toggle-text">Claro</span>
          </button>
          <label class="field topbar-user-field">
            <select id="global-user-selector"></select>
          </label>
        </div>
      </div>
    </header>

    <div class="page-shell">
      <main class="layout library-layout">
        <section class="panel">
          <div class="panel-header">
            <div>
              <p class="panel-kicker">Top sugerencias</p>
              <h2>Qué ver a continuación</h2>
            </div>
          </div>

          <p id="watch-next-status" class="status-text"></p>
          <div id="watch-next-meta" class="results-meta"></div>
          <div id="watch-next-results" class="watch-next-grid"></div>
          <div id="watch-next-pagination" class="pagination" hidden>
            <button id="watch-next-prev-page" class="ghost-button" type="button">Anterior</button>
            <span id="watch-next-page-info" class="page-info"></span>
            <button id="watch-next-next-page" class="ghost-button" type="button">Siguiente</button>
          </div>
        </section>

        <aside class="panel filter-sidebar" aria-label="Filtros recomendaciones">
          <div class="panel-header sidebar-header">
            <div>
              <p class="panel-kicker">Filtros</p>
              <h2>Buscar y filtrar</h2>
            </div>
          </div>

          <div class="search-controls sidebar-controls">
            <label class="field search-field">
              <span>🔎 Búsqueda rápida</span>
              <div class="search-pill">
                <input
                  id="watch-next-search-input"
                  type="search"
                  placeholder="Busca entre las recomendaciones"
                />
              </div>
            </label>

            <label class="field small-field">
              <span>⭐ Nota mínima</span>
              <div class="rating-filter">
                <select id="watch-next-min-rating">
                  <option value="0" selected>Todas</option>
                  <option value="1">1+</option>
                  <option value="2">2+</option>
                  <option value="3">3+</option>
                  <option value="4">4+</option>
                  <option value="5">5+</option>
                  <option value="6">6+</option>
                  <option value="7">7+</option>
                  <option value="8">8+</option>
                  <option value="9">9+</option>
                  <option value="10">10</option>
                </select>
              </div>
            </label>

            <label class="field small-field">
              <span>📅 Año</span>
              <div class="rating-filter">
                <select id="watch-next-year-filter">
                  <option value="all" selected>Todos los años</option>
                </select>
              </div>
            </label>

            <label class="field small-field">
              <span>🎯 Nota FA mínima</span>
              <div class="rating-filter">
                <select id="watch-next-min-fa-rating">
                  <option value="0" selected>Todas</option>
                  <option value="5">5.0+</option>
                  <option value="6">6.0+</option>
                  <option value="6.5">6.5+</option>
                  <option value="7">7.0+</option>
                  <option value="7.5">7.5+</option>
                  <option value="8">8.0+</option>
                </select>
              </div>
            </label>

            <label class="field small-field">
              <span>🕒 Fecha de voto</span>
              <div class="rating-filter">
                <select id="watch-next-rated-window">
                  <option value="all" selected>Todas</option>
                  <option value="30">Últimos 30 días</option>
                  <option value="90">Últimos 3 meses</option>
                  <option value="180">Últimos 6 meses</option>
                  <option value="365">Último año</option>
                </select>
              </div>
            </label>

            <label class="field small-field">
              <span>📈 Score mínimo</span>
              <div class="rating-filter">
                <select id="watch-next-min-score">
                  <option value="0" selected>Todos</option>
                  <option value="5">5.0+</option>
                  <option value="6">6.0+</option>
                  <option value="7">7.0+</option>
                  <option value="8">8.0+</option>
                </select>
              </div>
            </label>

            <label class="field small-field">
              <span>👤 Soporte mínimo</span>
              <div class="rating-filter">
                <select id="watch-next-min-support">
                  <option value="1" selected>1 usuario o más</option>
                  <option value="2">2 usuarios o más</option>
                  <option value="3">3 usuarios o más</option>
                  <option value="4">4 usuarios o más</option>
                </select>
              </div>
            </label>

            <label class="field small-field">
              <span>🤝 Afinidad mínima</span>
              <div class="rating-filter">
                <select id="watch-next-min-agreement">
                  <option value="0" selected>Cualquiera</option>
                  <option value="0.6">60%+</option>
                  <option value="0.7">70%+</option>
                  <option value="0.8">80%+</option>
                  <option value="0.9">90%+</option>
                </select>
              </div>
            </label>

            <label class="field small-field">
              <span>↕ Ordenar por</span>
              <div class="rating-filter">
                <select id="watch-next-sort-by">
                  <option value="rank" selected>Ranking recomendado</option>
                  <option value="score-desc">Score: mayor a menor</option>
                  <option value="support-desc">Soporte: mayor a menor</option>
                  <option value="agreement-desc">Afinidad: mayor a menor</option>
                  <option value="year-desc">Año: más nuevo</option>
                  <option value="title-asc">Título A-Z</option>
                </select>
              </div>
            </label>

            <label class="field small-field">
              <span>👥 Votos comunes</span>
              <div class="toggle-field">
                <input id="watch-next-shared-only" type="checkbox" />
                <span>Solo apoyo múltiple</span>
              </div>
            </label>
          </div>
        </aside>
      </main>
    </div>

    <footer class="site-footer">
      <div class="site-footer-inner">
        <p class="site-footer-line">🎬 Proyecto creado por <strong>Rubén Cougil</strong> ✨</p>
        <a class="site-footer-link" href="https://ruben.cougil.com/" target="_blank" rel="noreferrer">🌐 ruben.cougil.com</a>
      </div>
    </footer>

    <template id="watch-next-template">
      <article class="watch-next-card">
        <a class="watch-next-poster-link" href="" target="_blank" rel="noreferrer">
          <img class="watch-next-poster" src="" alt="" loading="lazy" />
        </a>
        <div class="watch-next-body">
          <div class="watch-next-topline">
            <span class="watch-next-score"></span>
            <span class="watch-next-year"></span>
          </div>
          <h3 class="watch-next-title"></h3>
          <p class="watch-next-rationale"></p>
          <div class="watch-next-chips"></div>
        </div>
      </article>
    </template>

    <div id="trailer-modal" class="trailer-modal" hidden>
      <div class="trailer-modal-dialog" role="dialog" aria-modal="true" aria-labelledby="trailer-title">
        <div class="trailer-modal-header">
          <h3 id="trailer-title">Trailer</h3>
          <button id="trailer-close" class="ghost-button trailer-close" type="button" aria-label="Cerrar trailer">
            ✕
          </button>
        </div>
        <div class="trailer-frame-wrap">
          <iframe
            id="trailer-frame"
            title="Trailer de YouTube"
            src=""
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
            referrerpolicy="strict-origin-when-cross-origin"
            allowfullscreen
          ></iframe>
        </div>
      </div>
    </div>

    <script src="theme.js"></script>
    <script src="static-data.js"></script>
    <script src="watch-next.js"></script>
  </body>
</html>
