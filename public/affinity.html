<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FilmAffinity Explorer Afinidad</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="topbar-inner">
        <div class="brand-block">
          <a class="brand-mark" href="/">FilmAffinity Explorer</a>
        </div>

        <nav class="top-links" aria-label="Primary">
          <a data-nav-target="home" href="/">🎬 Biblioteca</a>
          <a data-nav-target="stats" href="/stats.html">📊 Estadísticas</a>
          <a class="is-active" data-nav-target="affinity" href="/affinity.html">🤝 Afinidad</a>
          <a data-nav-target="watchnext" href="/watch-next.html">🍿 Qué ver</a>
          <a data-nav-target="sync" href="/sync.html">⚡ Sync</a>
        </nav>

        <label class="field topbar-user-field">
          <select id="global-user-selector"></select>
        </label>
      </div>
    </header>

    <div class="page-shell">
      <header class="hero panel">
        <p class="panel-kicker">Afinidad entre usuarios</p>
        <h1 id="affinity-title">🤝 Afinidad de usuario</h1>
        <p id="affinity-subtitle" class="hero-copy">
          Compara el usuario seleccionado con otra persona para ver compatibilidad, acuerdos y discrepancias.
        </p>
      </header>

      <main class="layout layout-single">
        <section class="panel affinity-panel">
          <div class="panel-header">
            <div>
              <p class="panel-kicker">Comparador</p>
              <h2>Usuario a comparar</h2>
            </div>
          </div>

          <div class="filters-inline affinity-toolbar">
            <label class="field small-field year-filter-field">
              <span>👤 Comparar con</span>
              <div class="rating-filter">
                <select id="affinity-peer-selector"></select>
              </div>
            </label>
          </div>

          <p id="affinity-status" class="status-text affinity-status"></p>
          <div id="affinity-content" class="affinity-content"></div>
        </section>
      </main>
    </div>

    <script src="/affinity.js"></script>
  </body>
</html>
