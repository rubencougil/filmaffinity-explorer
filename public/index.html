<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow, noarchive, nosnippet, noimageindex" />
    <meta name="googlebot" content="noindex, nofollow, noarchive, nosnippet, noimageindex" />
    <meta name="bingbot" content="noindex, nofollow, noarchive, nosnippet, noimageindex" />
    <title>FilmAffinity Explorer</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="topbar-inner">
        <div class="brand-block">
          <a class="brand-mark" href="index.html">FilmAffinity Explorer</a>
        </div>

        <button class="hamburger-button" id="nav-menu-toggle" type="button" aria-label="Abrir menú" aria-expanded="false" aria-controls="top-nav">
          <span class="hamburger-icon" aria-hidden="true"></span>
          <span class="hamburger-icon" aria-hidden="true"></span>
          <span class="hamburger-icon" aria-hidden="true"></span>
        </button>

        <nav class="top-links" id="top-nav" aria-label="Primary">
          <a class="is-active" data-nav-target="home" href="index.html">🎬 Biblioteca</a>
          <a data-nav-target="watchnext" href="watch-next.html">🍿 Qué ver</a>
          <a data-nav-target="affinity" href="affinity.html">🤝 Afinidad</a>
          <a data-nav-target="stats" href="stats.html">📊 Estadísticas</a>
        </nav>

        <div class="topbar-controls">
          <button id="global-theme-toggle" class="theme-toggle" type="button" aria-label="Cambiar tema" aria-pressed="false">
            <span class="theme-toggle-track" aria-hidden="true"><span class="theme-toggle-thumb"></span></span>
            <span class="theme-toggle-text">Claro</span>
          </button>
          <label class="field topbar-user-field">
            <span class="user-selector-label">👤 Usuario</span>
            <select id="global-user-selector"></select>
          </label>
        </div>
      </div>
    </header>

    <div class="page-shell">
      <main class="layout library-layout">
        <button id="mobile-filter-toggle" class="mobile-filter-toggle" type="button" aria-expanded="false" aria-controls="filter-sidebar">
          <span class="mobile-filter-toggle-label">🔧 Mostrar filtros</span>
        </button>

        <section id="results-section" class="panel search-panel">
          <div class="panel-header">
            <div>
              <p class="panel-kicker">Explorar</p>
              <h2 id="results-title">Votaciones del usuario seleccionado</h2>
            </div>
          </div>

          <div class="browse-user-bar">
            <p id="import-status" class="status-text browse-status"></p>
          </div>

          <div id="results-meta" class="results-meta">Todavía no hay votaciones importadas.</div>
          <div id="results" class="results-grid"></div>
          <div id="pagination" class="pagination" hidden>
            <button id="prev-page" class="ghost-button" type="button">Anterior</button>
            <span id="page-info" class="page-info"></span>
            <button id="next-page" class="ghost-button" type="button">Siguiente</button>
          </div>
        </section>

        <aside id="filter-sidebar" class="panel filter-sidebar" aria-label="Filtros">
          <div class="panel-header sidebar-header">
            <div>
              <p class="panel-kicker">Filtros</p>
              <h2>Buscar y filtrar</h2>
            </div>
          </div>

          <div class="search-controls sidebar-controls">
            <label class="field search-field">
              <span>🔎 Búsqueda rápida</span>
              <div class="search-pill">
                <input
                  id="search-input"
                  type="search"
                  placeholder="Escribe aquí para encontrar cualquier título en segundos ✨"
                />
              </div>
            </label>

            <label class="field small-field">
              <span>⭐ Nota mínima</span>
              <div class="rating-filter">
                <select id="min-rating">
                  <option value="0" selected>Todas (incluye sin nota)</option>
                  <option value="1">1+</option>
                  <option value="2">2+</option>
                  <option value="3">3+</option>
                  <option value="4">4+</option>
                  <option value="5">5+</option>
                  <option value="6">6+</option>
                  <option value="7">7+</option>
                  <option value="8">8+</option>
                  <option value="9">9+</option>
                  <option value="10">10</option>
                </select>
              </div>
            </label>

            <label class="field small-field">
              <span>📅 Año</span>
              <div class="rating-filter">
                <select id="year-filter">
                  <option value="all" selected>Todos los años</option>
                </select>
              </div>
            </label>

            <label class="field small-field">
              <span>🎯 Nota FA mínima</span>
              <div class="rating-filter">
                <select id="min-fa-rating">
                  <option value="0" selected>Todas</option>
                  <option value="5">5.0+</option>
                  <option value="6">6.0+</option>
                  <option value="6.5">6.5+</option>
                  <option value="7">7.0+</option>
                  <option value="7.5">7.5+</option>
                  <option value="8">8.0+</option>
                </select>
              </div>
            </label>

            <label class="field small-field">
              <span>🕒 Fecha de voto</span>
              <div class="rating-filter">
                <select id="rated-window">
                  <option value="all" selected>Todas</option>
                  <option value="30">Últimos 30 días</option>
                  <option value="90">Últimos 3 meses</option>
                  <option value="180">Últimos 6 meses</option>
                  <option value="365">Último año</option>
                </select>
              </div>
            </label>

            <label class="field small-field">
              <span>↕ Ordenar por</span>
              <div class="rating-filter">
                <select id="sort-by">
                  <option value="recent" selected>Más recientes</option>
                  <option value="rating-desc">Tu nota: mayor a menor</option>
                  <option value="rating-asc">Tu nota: menor a mayor</option>
                  <option value="fa-desc">Nota FA: mayor a menor</option>
                  <option value="fa-asc">Nota FA: menor a mayor</option>
                  <option value="year-desc">Año: más nuevo</option>
                  <option value="year-asc">Año: más antiguo</option>
                  <option value="title-asc">Título A-Z</option>
                </select>
              </div>
            </label>

            <label class="field small-field">
              <span>👥 Votos comunes</span>
              <div class="toggle-field">
                <input id="shared-only" type="checkbox" />
                <span>Solo títulos compartidos</span>
              </div>
            </label>
          </div>
        </aside>
      </main>
    </div>

    <footer class="site-footer">
      <div class="site-footer-inner">
        <p class="site-footer-line">🎬 Proyecto creado por <strong>Rubén Cougil</strong> ✨</p>
        <a class="site-footer-link" href="https://ruben.cougil.com/" target="_blank" rel="noreferrer">🌐 ruben.cougil.com</a>
      </div>
    </footer>

    <template id="result-template">
      <article class="result-card">
        <a class="poster-link" href="" target="_blank" rel="noreferrer">
          <img class="result-poster" src="" alt="" loading="lazy" />
        </a>
        <div class="result-body">
          <div class="result-topline">
            <div class="result-rating-meta">
              <span class="vote-pill"></span>
              <span class="fa-average-pill"></span>
            </div>
            <span class="result-year"></span>
          </div>
          <h3 class="result-title"></h3>
          <p class="result-date"></p>
          <div class="comparison-list"></div>
        </div>
      </article>
    </template>

    <div id="trailer-modal" class="trailer-modal" hidden>
      <div class="trailer-modal-dialog" role="dialog" aria-modal="true" aria-labelledby="trailer-title">
        <div class="trailer-modal-header">
          <h3 id="trailer-title">Trailer</h3>
          <button id="trailer-close" class="ghost-button trailer-close" type="button" aria-label="Cerrar trailer">
            ✕
          </button>
        </div>
        <div class="trailer-frame-wrap">
          <iframe
            id="trailer-frame"
            title="Trailer de YouTube"
            src=""
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
            referrerpolicy="strict-origin-when-cross-origin"
            allowfullscreen
          ></iframe>
        </div>
      </div>
    </div>

    <script src="theme.js"></script>
    <script src="static-data.js"></script>
    <script src="app.js"></script>
  </body>
</html>
