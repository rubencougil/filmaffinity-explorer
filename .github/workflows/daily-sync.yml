name: Weekly Filmaffinity Sync

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-filmaffinity-sync
  cancel-in-progress: true

jobs:
  sync-and-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.FILMAFFINITY_PUSH_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Write config.json from secret
        env:
          FILMAFFINITY_CONFIG_JSON: ${{ secrets.FILMAFFINITY_CONFIG_JSON }}
        run: |
          set -euo pipefail
          if [ -z "${FILMAFFINITY_CONFIG_JSON:-}" ]; then
            echo "Missing FILMAFFINITY_CONFIG_JSON secret."
            exit 1
          fi

          printf '%s' "$FILMAFFINITY_CONFIG_JSON" > config.json

      - name: Run sync
        env:
          CI: true
        run: npm run sync:static

      - name: Commit updated data
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/libraries.json

          if git diff --cached --quiet; then
            echo "No data changes to commit."
            exit 0
          fi

          git commit -m "chore: refresh Filmaffinity data"
          git push origin HEAD:main
