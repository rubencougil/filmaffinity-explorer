name: Daily Filmaffinity Sync

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: daily-filmaffinity-sync
  cancel-in-progress: true

jobs:
  sync-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Write config.json from secret
        env:
          FILMAFFINITY_CONFIG_JSON: ${{ secrets.FILMAFFINITY_CONFIG_JSON }}
        run: |
          set -euo pipefail
          if [ -z "${FILMAFFINITY_CONFIG_JSON:-}" ]; then
            echo "Missing FILMAFFINITY_CONFIG_JSON secret."
            exit 1
          fi

          printf '%s' "$FILMAFFINITY_CONFIG_JSON" > config.json

      - name: Run sync
        env:
          CI: true
        run: npm run sync:static

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
