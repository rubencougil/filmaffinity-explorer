name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare local config
        run: cp config.example.json config.json

      - name: Validate Node scripts syntax
        run: |
          node --check server.js
          node --check sync-filmaffinity.js
          node --check public/app.js
          node --check public/stats.js
          node --check public/sync.js

      - name: Start server and smoke test
        run: |
          set -euo pipefail
          npm start > server.log 2>&1 &
          SERVER_PID=$!
          trap "kill $SERVER_PID" EXIT

          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:3000 > /dev/null; then
              break
            fi
            sleep 1
          done

          curl -fsS http://127.0.0.1:3000/api/config > /dev/null
          curl -fsS http://127.0.0.1:3000/stats.html > /dev/null
          curl -fsS http://127.0.0.1:3000/sync.html > /dev/null

      - name: Upload server log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: server-log
          path: server.log
